name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: PHP tests (SQLite in-memory)
  # ──────────────────────────────────────────────────────────────
  test:
    name: PHP 8.3 Test Suite
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_sqlite, sqlite3, mbstring, xml, ctype, bcmath, intl, zip
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: php-${{ hashFiles('composer.lock') }}
          restore-keys: php-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Copy .env for testing
        run: cp .env.example .env.testing

      - name: Generate application key
        run: php artisan key:generate --env=testing

      - name: Run tests
        run: php artisan test --parallel --stop-on-failure
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          SESSION_DRIVER: array
          CACHE_STORE: array
          QUEUE_CONNECTION: sync

  # ──────────────────────────────────────────────────────────────
  # Job 2: Frontend build (Node 20 + Vite)
  # ──────────────────────────────────────────────────────────────
  build:
    name: Frontend Build
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: public/build/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Job 3: Deploy to production (only on push to main, after tests pass)
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: [test, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://msme-tracker.in

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: public/build/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          port:     ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            cd /var/www/msme-tracker
            bash deploy/deploy.sh main
