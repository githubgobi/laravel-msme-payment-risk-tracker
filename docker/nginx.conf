worker_processes  auto;
error_log         /dev/stderr warn;
pid               /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /dev/stdout;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    gzip            on;
    gzip_vary       on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml font/woff2;

    # Write temp files to /tmp so www-data can write without root
    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path       /tmp/nginx_proxy;
    fastcgi_temp_path     /tmp/nginx_fastcgi;

    server {
        listen      80;
        server_name _;

        root  /var/www/html/public;
        index index.php;

        client_max_body_size 20M;

        # Static assets — Vite outputs content-hashed filenames so 1-year cache is safe
        location ~* \.(?:css|js|woff2?|ttf|svg|png|jpg|jpeg|gif|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }

        # Laravel SPA — all routes funnel through index.php
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass  127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include       fastcgi_params;

            fastcgi_buffer_size       128k;
            fastcgi_buffers           4 256k;
            fastcgi_busy_buffers_size 256k;
            fastcgi_read_timeout      60s;

            fastcgi_hide_header X-Powered-By;
        }

        # Block hidden files (.env, .git, etc.)
        location ~ /\. {
            deny all;
            access_log off;
        }
    }
}
