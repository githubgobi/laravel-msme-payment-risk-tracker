# /etc/nginx/sites-available/msme-tracker
# Symlink to /etc/nginx/sites-enabled/msme-tracker

# Upstream PHP-FPM socket
upstream php-fpm {
    server unix:/run/php/php8.3-fpm.sock;
    keepalive 4;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name msme-tracker.in www.msme-tracker.in;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS main server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name msme-tracker.in www.msme-tracker.in;

    root /var/www/msme-tracker/public;
    index index.php;

    # SSL certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/msme-tracker.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/msme-tracker.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (belt-and-suspenders alongside Laravel middleware)
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Gzip compression — reduces Inertia SSR payload size significantly
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json
               application/x-javascript text/xml application/xml application/rss+xml
               image/svg+xml font/woff font/woff2;

    # Static assets — long-lived cache (Vite generates content-hashed filenames)
    location ~* \.(?:css|js|woff2?|ttf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Rate limiting at Nginx level (belt-and-suspenders alongside Laravel throttle)
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=register:10m rate=3r/m;

    location ~ ^/login$ {
        limit_req zone=login burst=2 nodelay;
        try_files $uri /index.php?$query_string;
    }

    location ~ ^/register$ {
        limit_req zone=register burst=1 nodelay;
        try_files $uri /index.php?$query_string;
    }

    # Laravel Inertia SPA — all URLs funnel through index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri /index.php =404;
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_buffer_size       128k;
        fastcgi_buffers           4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout      60s;

        # Hide server info
        fastcgi_hide_header X-Powered-By;
    }

    # Deny access to hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block direct access to PHP files in storage/ (should never happen but defence-in-depth)
    location ~* /storage/.*\.php$ {
        deny all;
    }

    # Logging
    access_log /var/log/nginx/msme-tracker-access.log combined buffer=512k flush=1m;
    error_log  /var/log/nginx/msme-tracker-error.log warn;

    # Max upload size (Excel imports can be large)
    client_max_body_size 20M;
}
