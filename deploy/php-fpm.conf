; /etc/php/8.3/fpm/pool.d/msme-tracker.conf
; Override the default www.conf pool for the MSME Tracker app

[msme-tracker]

; User/group the PHP workers run as — must match Nginx's user or use ACL
user  = www-data
group = www-data

; Listen on Unix socket (faster than TCP for same-host Nginx)
listen = /run/php/php8.3-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode  = 0660

; Dynamic PM scales workers based on load
pm = dynamic
pm.max_children      = 20
pm.start_servers     = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests      = 500    ; recycle workers to prevent memory leaks

; Timeouts
request_terminate_timeout = 60s   ; abort requests that hang (import/export exception)
request_slowlog_timeout   = 10s
slowlog = /var/log/php8.3-fpm-msme-slow.log

; PHP INI overrides for production
php_admin_value[error_log]             = /var/log/php8.3-fpm-msme-error.log
php_admin_flag[log_errors]             = on
php_admin_flag[display_errors]         = off
php_admin_flag[display_startup_errors] = off
php_admin_value[error_reporting]       = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Memory limits
php_admin_value[memory_limit]          = 256M
php_admin_value[upload_max_filesize]   = 20M
php_admin_value[post_max_size]         = 21M
php_admin_value[max_execution_time]    = 60

; Opcache tuning — validate_timestamps=0 means no inotify; deploy.sh must reload php-fpm
php_admin_value[opcache.enable]               = 1
php_admin_value[opcache.memory_consumption]   = 128
php_admin_value[opcache.interned_strings_buffer] = 16
php_admin_value[opcache.max_accelerated_files] = 10000
php_admin_value[opcache.validate_timestamps]  = 0
php_admin_value[opcache.revalidate_freq]      = 0
php_admin_value[opcache.fast_shutdown]        = 1

; Session handling via Redis (matches SESSION_DRIVER=redis in production .env)
php_admin_value[session.save_handler] = redis
php_admin_value[session.save_path]    = "tcp://127.0.0.1:6379?database=1"
