# /etc/redis/redis.conf overrides for MSME Tracker production
# Apply by editing /etc/redis/redis.conf or using redis.conf.d/ includes

# Bind only to localhost — never expose Redis to the internet
bind 127.0.0.1 -::1

# Password (also set REDIS_PASSWORD in .env)
requirepass CHANGE_ME_REDIS_PASSWORD

# Memory limit — set to ~60% of available RAM; adjust per server
# We use allkeys-lru so Redis evicts the least-recently-used key when full
# This is safe because all persisted state is in MySQL; Redis is cache+queues
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence — DISABLED for ephemeral cache/queue use
# Queued jobs that survive a restart are re-queued by Supervisor restart
# If you need durability, enable AOF with appendonly yes
save ""
appendonly no

# Slow query log — useful for diagnosing latency spikes
slowlog-log-slower-than 10000  # microseconds (10ms)
slowlog-max-len 128

# Databases used by this app:
#   DB 0  — queue (QUEUE_REDIS_DATABASE=0)
#   DB 1  — sessions (session.save_path in php-fpm.conf)
#   DB 2  — cache (REDIS_DB=2)
databases 16

# Connection backlog
tcp-backlog 511
tcp-keepalive 300

# Log to syslog for systemd journal integration
loglevel notice
logfile /var/log/redis/redis-server.log
